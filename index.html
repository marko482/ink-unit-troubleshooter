<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ink Unit Troubleshooter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header">
      <img src="logo.png" class="logo" alt="Company Logo" />
      <div class="title">
        Ink Unit Troubleshooter
        <span class="version">v1.0</span>
      </div>
    </div>
    <div class="wrap">
      <div class="diagram" id="diagram">
        <div class="toolbar">
          <button class="btn primary" id="toggleEdit">Edit: OFF</button>
          <button class="btn" id="addBox" disabled>Add Box</button>
          <button class="btn" id="deleteBox" disabled>Delete</button>
          <button class="btn" id="saveLocal">Save</button>
          <button class="btn" id="exportJson">Export</button>
          <span class="muted" id="status"></span>
        </div>

        <div class="imgWrap" id="imgWrap">
          <img
            id="diagramImg"
            src="MeniscusUnitFlowDiagram.png"
            alt="diagram"
          />
          <div id="hotspotLayer"></div>
        </div>
      </div>

      <div class="panel" id="panel">
        <div style="display: flex; gap: 8px; margin-bottom: 12px">
          <input
            id="searchInput"
            placeholder="Search parts, tags, symptoms..."
            style="
              flex: 1;
              padding: 10px 12px;
              border: 1px solid #ccc;
              border-radius: 10px;
              font-size: 14px;
            "
          />
          <button id="clearSearch" class="btn">Clear</button>
        </div>

        <div id="searchResults"></div>
        <hr style="border: none; border-top: 1px solid #eee; margin: 12px 0" />
        <h2>Click a component</h2>
        <div class="muted">
          Use Edit mode to create/adjust boxes. Save = Local. Export = paste
          back into the HTML.
        </div>
      </div>
    </div>

    <script defer src="./app.js"></script>
  </body>
</html>
